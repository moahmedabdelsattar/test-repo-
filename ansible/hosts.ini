pipeline {
    agent any
    stages {
        stage('Build Image') { steps { sh 'docker build -t myapp:latest .' } }
        stage('Scan Image') { steps { sh 'echo "Scanning image..."' } }
        stage('Push Image') { steps {
            sh 'docker tag myapp:latest myrepo/myapp:latest'
            sh 'docker push myrepo/myapp:latest'
        } }
        stage('Deploy') { steps { sh 'kubectl apply -f k8s/deployment.yaml' } }
    }
}